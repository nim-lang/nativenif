# ghast (GPU codegen, Leng -> SPIR-V) lives in nativenif beside arkham (CPU
# codegen) and reuses nimony's NIF libraries — the same arrangement arkham and
# nifasm use. nimony is a sibling repo.
--path: "../../../nimony/src/lib"
--warning[UnusedImport]: off
--styleCheck: off
# No --outdir here: ghast is built on demand by nimony's `.build` pragma, which
# passes an explicit `-o:` into the nifcache. (A standalone build can pass its
# own `-o:bin/ghast`.)
