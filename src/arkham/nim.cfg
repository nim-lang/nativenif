# arkham lives in nativenif but reuses nimony's NIF reader/parser libraries.
# nimony is a sibling repo (the same arrangement nifasm uses, see its imports).
--path: "../../../nimony/src/lib"
# Reuse nifasm's generated instruction/decl enums (A64Inst, NifasmDecl) as the
# single source of truth for the asm-NIF tag vocabulary arkham emits.
--path: "../nifasm"
# Shared nifcore-based code used by both backends (the lazy foreign-module loader).
--path: "../common"
--warning[UnusedImport]: off
--styleCheck: off
# Btw this relies on a Nim bug where it interprets the --outdir relative to the
# current directory instead of the directory of this nim.cfg file.
--outdir: "bin"
